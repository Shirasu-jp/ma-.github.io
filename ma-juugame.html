<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スーパーマージューティング</title>
    <style>
        body {
            text-align: center;
            background-color: #111;
            font-family: sans-serif;
            color: #fff;
            margin-top: 20px;
            user-select: none;
            touch-action: none; /* スマホのスクロールを固定 */
        }
        h2 {
            color: #ff4500;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255, 69, 0, 0.6);
        }
        #scoreContainer {
            font-size: 18px;
            margin-bottom: 10px;
            color: #ccc;
        }
        #score {
            color: #ffd700;
            font-weight: bold;
            font-size: 22px;
        }
        canvas {
            background-color: #050510;
            border: 3px solid #ff4500;
            border-radius: 8px;
            display: block;
            margin: 0 auto;
            box-shadow: 0 0 20px rgba(255, 69, 0, 0.4);
            cursor: crosshair;
            max-width: 100%;
            height: auto;
        }
        #restartBtn {
            display: none;
            margin: 15px auto;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            background-color: #ff4500;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 69, 0, 0.4);
        }
        #restartBtn:hover {
            background-color: #e03d00;
        }
    </style>
</head>
<body>

    <h2>スーパーマージューティング</h2>
    <div id="scoreContainer">SCORE: <span id="score">0</span></div>

    <canvas id="gameCanvas" width="450" height="600"></canvas>

    <div>
        <button id="restartBtn" onclick="resetGame()">大当りを目指してリトライ (´ω`)</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const restartBtn = document.getElementById("restartBtn");

        let score = 0;
        let isGameOver = false;
        let frame = 0;
        
        let bullets = [];
        let enemies = [];
        let shootCooldown = 0;
        let sakiBareTimer = 0; // 先バレ演出用のタイマー

        // 自機の設定
        const player = {
            x: 195,
            y: 500,
            width: 60,
            height: 20,
            text: "(´ω`)ﾏｰ"
        };

        // マウス・タッチ位置への追従処理
        function handleMove(e) {
            if (isGameOver) return;
            const rect = canvas.getBoundingClientRect();
            let clientX, clientY;
            
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            // 指やマウスの中心にキャラが来るように調整
            player.x = (clientX - rect.left) * (canvas.width / rect.width) - 30;
            player.y = (clientY - rect.top) * (canvas.height / rect.height) - 10;
        }

        canvas.addEventListener("mousemove", handleMove);
        canvas.addEventListener("touchmove", (e) => {
            handleMove(e);
            e.preventDefault();
        }, { passive: false });

        // キーボード操作用
        const keys = {};
        window.addEventListener("keydown", (e) => {
            keys[e.code] = true;
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Space"].includes(e.code)) e.preventDefault();
        });
        window.addEventListener("keyup", (e) => { keys[e.code] = false; });

        function resetGame() {
            score = 0;
            isGameOver = false;
            frame = 0;
            bullets = [];
            enemies = [];
            shootCooldown = 0;
            sakiBareTimer = 0;
            player.x = 195;
            player.y = 500;
            restartBtn.style.display = "none";
            loop();
        }

        function update() {
            if (isGameOver) return;
            frame++;

            // キーボード移動の処理（ハイブリッド）
            if (keys["ArrowLeft"] || keys["KeyA"]) player.x -= 6;
            if (keys["ArrowRight"] || keys["KeyD"]) player.x += 6;
            if (keys["ArrowUp"] || keys["KeyW"]) player.y -= 6;
            if (keys["ArrowDown"] || keys["KeyS"]) player.y += 6;

            // 画面外はみ出し防止の壁判定
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - 60) player.x = canvas.width - 60;
            if (player.y < 0) player.y = 0;
            if (player.y > canvas.height - 20) player.y = canvas.height - 20;

            // 自動ショット (8フレームに1発発射)
            if (shootCooldown <= 0) {
                bullets.push({ x: player.x + 26, y: player.y - 5, speed: 9 });
                shootCooldown = 8;
            } else {
                shootCooldown--;
            }

            // 弾の移動
            bullets.forEach(b => b.y -= b.speed);
            bullets = bullets.filter(b => b.y > 0);

            // 【脳汁要素】先バレ演出のタイマーカウント
            if (sakiBareTimer > 0) {
                sakiBareTimer--;
                if (sakiBareTimer === 0) {
                    // タイマー終了と同時に「巨ボス」が降臨
                    enemies.push({
                        x: Math.random() * (canvas.width - 120) + 10,
                        y: -60,
                        width: 110,
                        height: 35,
                        text: "( ﾟДﾟ)巨",
                        hp: 25,
                        maxHp: 25,
                        isBoss: true,
                        speed: 0.8
                    });
                }
            }

            // 敵の出現管理 (先バレ演出中はザコが湧かない)
            if (frame % 30 === 0 && sakiBareTimer === 0) {
                // 12%の確率で先バレ（激熱予兆）が始動
                if (Math.random() < 0.12 && !enemies.some(e => e.isBoss)) {
                    sakiBareTimer = 130; // 約2秒間の先バレフラッシュタイム
                } else {
                    // 通常の敵をスポーン
                    enemies.push({
                        x: Math.random() * (canvas.width - 50) + 10,
                        y: -30,
                        width: 50,
                        height: 20,
                        text: "(ﾟДﾟ)",
                        hp: 1,
                        isBoss: false,
                        speed: Math.random() * 2 + 2.5
                    });
                }
            }

            // 敵の移動
            enemies.forEach(e => e.y += e.speed);

            // 当たり判定：弾 vs 敵
            for (let bIdx = bullets.length - 1; bIdx >= 0; bIdx--) {
                let b = bullets[bIdx];
                for (let eIdx = enemies.length - 1; eIdx >= 0; eIdx--) {
                    let e = enemies[eIdx];
                    
                    if (b.x > e.x && b.x < e.x + e.width && b.y > e.y && b.y < e.y + e.height) {
                        bullets.splice(bIdx, 1); // 弾消滅
                        e.hp--;
                        
                        if (e.hp <= 0) {
                            score += e.isBoss ? 1000 : 100; // ボスなら1000点
                            enemies.splice(eIdx, 1);
                        }
                        break;
                    }
                }
            }

            // 当たり判定：敵 vs 自機
            for (let e of enemies) {
                // 当たり判定は文字サイズに合わせて少しタイトに調整
                if (e.x < player.x + 50 && e.x + e.width > player.x + 10 &&
                    e.y < player.y + 20 && e.y + e.height > player.y) {
                    isGameOver = true;
                    restartBtn.style.display = "block";
                }
            }

            // 画面下に出た敵を削除
            enemies = enemies.filter(e => e.y < canvas.height);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 先バレ中の背景フラッシュ（赤と黒が交互に明滅する演出）
            if (sakiBareTimer > 0) {
                if (Math.floor(sakiBareTimer / 8) % 2 === 0) {
                    ctx.fillStyle = "rgba(255, 0, 0, 0.18)";
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }
            }

            // 自機の描画
            ctx.fillStyle = "#5ddcff";
            ctx.font = "bold 20px sans-serif";
            ctx.textBaseline = "top";
            ctx.fillText(player.text, player.x, player.y);

            // 弾の描画
            ctx.fillStyle = "#ffd700";
            bullets.forEach(b => ctx.fillRect(b.x, b.y, 3, 12));

            // 敵の描画
            enemies.forEach(e => {
                if (e.isBoss) {
                    // ボスの描画
                    ctx.fillStyle = "#ff2222";
                    ctx.font = "bold 38px sans-serif";
                    ctx.fillText(e.text, e.x, e.y);
                    
                    // ボスのHPゲージ表示
                    ctx.fillStyle = "rgba(255, 255, 255, 0.2)";
                    ctx.fillRect(e.x, e.y - 12, e.width, 5);
                    ctx.fillStyle = "#ff0000";
                    ctx.fillRect(e.x, e.y - 12, (e.hp / e.maxHp) * e.width, 5);
                } else {
                    // 通常敵
                    ctx.fillStyle = "#ffaa00";
                    ctx.font = "bold 18px sans-serif";
                    ctx.fillText(e.text, e.x, e.y);
                }
            });

            // 先バレのデカ文字警告演出
            if (sakiBareTimer > 0) {
                ctx.fillStyle = "#ff1493";
                ctx.font = "bold 34px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("＼ポキューン／", canvas.width / 2, canvas.height / 2 - 40);
                
                ctx.fillStyle = "#ff3300";
                ctx.font = "bold 44px sans-serif";
                ctx.fillText("激 熱 予 兆", canvas.width / 2, canvas.height / 2 + 15);
                ctx.textAlign = "left"; // 基準を戻す
            }

            // スコア表示
            document.getElementById("score").innerText = score;

            // ゲームオーバー画面
            if (isGameOver) {
                ctx.fillStyle = "rgba(0,0,0,0.85)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = "#ff3333";
                ctx.font = "bold 40px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("GAME OVER (ﾟДﾟ)", canvas.width / 2, canvas.height / 2 - 20);
                
                ctx.fillStyle = "#fff";
                ctx.font = "16px sans-serif";
                ctx.fillText("突確ならず！下のボタンから再挑戦", canvas.width / 2, canvas.height / 2 + 30);
                ctx.textAlign = "left";
            }
        }

        function loop() {
            update();
            draw();
            if (!isGameOver) {
                requestAnimationFrame(loop);
            }
        }

        // スタート
        resetGame();
    </script>
</body>
</html>
