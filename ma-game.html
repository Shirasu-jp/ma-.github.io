<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>(´ω`)ﾏｰ ザ・ダイナソー</title>
    <style>
        body {
            text-align: center;
            background-color: #f7f7f7;
            font-family: 'Courier New', Courier, monospace, sans-serif;
            margin-top: 50px;
            color: #333;
        }
        canvas {
            background-color: #ffffff;
            border-bottom: 2px solid #555; /* 地面を表現 */
            box-shadow: 0px 10px 20px rgba(0,0,0,0.05);
            cursor: pointer;
        }
        #info {
            margin-top: 20px;
            font-weight: bold;
            line-height: 1.6;
        }
        kbd {
            background-color: #eee;
            border: 1px solid #ccc;
            border-radius: 3px;
            padding: 2px 6px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <h2>(´ω`)ﾏｰ ザ・ダイナソー</h2>
    <!-- 少し横長にして反応しやすくしました -->
    <canvas id="gameCanvas" width="800" height="250"></canvas>
    
    <div id="info">
        ジャンプ: <kbd>Space</kbd> / <kbd>↑</kbd> ｜ しゃがむ: <kbd>↓</kbd> (長押し)<br>
        ※ジャンプ中に <kbd>↓</kbd> で急降下します
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // ゲームの基本設定
        let gameSpeed = 6;
        let score = 0;
        let highScore = 0;
        let isGameOver = false;
        let frame = 0;
        let nextSpawn = 0;

        // キャラクターのテキスト
        const TEXT_NORMAL = "(´ω`)ﾏｰ";
        const TEXT_DUCK = "(＿ω＿)ﾏｰ"; // しゃがみ状態
        const ENEMY_GROUND = "(ﾟДﾟ)";
        const ENEMY_FLYING = "⊂(ﾟДﾟ)⊃";

        const GROUND_Y = 220; // 地面の高さ

        // 主人公の設定
        const player = {
            x: 50,
            y: GROUND_Y - 30,
            width: 80,
            height: 30,
            dy: 0,
            gravity: 0.6,
            jumpPower: -10,
            isJumping: false,
            isDucking: false,
            
            draw() {
                ctx.fillStyle = "#333";
                ctx.font = "bold 24px sans-serif";
                ctx.textBaseline = "top";
                if (this.isDucking) {
                    // しゃがみ時は高さを半分にして当たり判定を小さくする
                    this.height = 15;
                    ctx.fillText(TEXT_DUCK, this.x, this.y + 15);
                } else {
                    this.height = 30;
                    ctx.fillText(TEXT_NORMAL, this.x, this.y);
                }
            }
        };

        // 障害物を入れる配列
        let obstacles = [];

        class Obstacle {
            constructor(type) {
                this.x = canvas.width;
                this.type = type; // 0: 地上, 1: 空中(低), 2: 空中(高)
                
                ctx.font = "bold 24px sans-serif";
                
                if (this.type === 0) {
                    this.text = ENEMY_GROUND;
                    this.width = ctx.measureText(this.text).width;
                    this.height = 30;
                    this.y = GROUND_Y - this.height;
                } else {
                    this.text = ENEMY_FLYING;
                    this.width = ctx.measureText(this.text).width;
                    this.height = 20;
                    // 空中の高さ設定
                    this.y = (this.type === 1) ? GROUND_Y - 50 : GROUND_Y - 80;
                }
            }

            update() {
                this.x -= gameSpeed;
            }

            draw() {
                ctx.fillStyle = this.type === 0 ? "#D2691E" : "#4682B4";
                ctx.font = "bold 24px sans-serif";
                ctx.textBaseline = "top";
                ctx.fillText(this.text, this.x, this.y);
            }
        }

        function resetGame() {
            player.y = GROUND_Y - 30;
            player.dy = 0;
            player.isJumping = false;
            obstacles = [];
            score = 0;
            gameSpeed = 6;
            frame = 0;
            nextSpawn = 50;
            isGameOver = false;
            requestAnimationFrame(loop);
        }

        // 入力管理
        const keys = {};
        window.addEventListener("keydown", (e) => {
            keys[e.code] = true;
            
            if (isGameOver && (e.code === "Space" || e.code === "ArrowUp")) {
                resetGame();
                return;
            }

            // ジャンプ
            if ((e.code === "Space" || e.code === "ArrowUp") && !player.isJumping) {
                player.dy = player.jumpPower;
                player.isJumping = true;
            }
        });

        window.addEventListener("keyup", (e) => {
            keys[e.code] = false;
        });

        // スマホやマウス用
        canvas.addEventListener("mousedown", () => {
            if (isGameOver) resetGame();
            else if (!player.isJumping) {
                player.dy = player.jumpPower;
                player.isJumping = true;
            }
        });

        function update() {
            if (isGameOver) return;

            // スピードとスコアの上昇
            gameSpeed += 0.002;
            score += 0.1; // クロームの恐竜ゲーム風にジワジワ増える

            // しゃがみ判定と急降下
            if (keys["ArrowDown"]) {
                if (player.isJumping) {
                    player.dy += player.gravity * 2; // ジャンプ中なら急降下
                } else {
                    player.isDucking = true;
                }
            } else {
                player.isDucking = false;
            }

            // 重力の適用
            player.dy += player.gravity;
            player.y += player.dy;

            // 着地判定
            if (player.y >= GROUND_Y - player.height && !player.isDucking) {
                player.y = GROUND_Y - player.height;
                player.dy = 0;
                player.isJumping = false;
            } else if (player.y >= GROUND_Y - 30 && player.isDucking) {
                // しゃがみ時の着地位置調整
                player.y = GROUND_Y - 30;
                player.dy = 0;
                player.isJumping = false;
            }

            // 障害物の出現処理
            frame++;
            if (frame >= nextSpawn) {
                // 0=サボテン, 1=低い鳥(ジャンプで避ける), 2=高い鳥(しゃがんで避ける)
                let type = 0;
                // スコアが高くなったら鳥（空中の敵）も出す
                if (score > 100) {
                    if (Math.random() < 0.3) type = 1;
                    else if (Math.random() < 0.3) type = 2;
                }
                
                obstacles.push(new Obstacle(type));
                
                // 次の出現タイミングをランダムに設定（スピードが上がるほど間隔を狭める）
                let minFrames = Math.max(40, 100 - gameSpeed * 5);
                let maxFrames = Math.max(80, 180 - gameSpeed * 5);
                nextSpawn = frame + Math.floor(Math.random() * (maxFrames - minFrames + 1) + minFrames);
            }

            // 障害物の移動と当たり判定
            for (let i = 0; i < obstacles.length; i++) {
                let obs = obstacles[i];
                obs.update();

                // ちょっと甘めの当たり判定（テキストの空白部分を考慮して -10 する）
                let hitboxPadding = 10;
                if (player.x + hitboxPadding < obs.x + obs.width - hitboxPadding &&
                    player.x + player.width - hitboxPadding > obs.x + hitboxPadding &&
                    player.y + hitboxPadding < obs.y + obs.height - hitboxPadding &&
                    player.y + player.height - hitboxPadding > obs.y + hitboxPadding) {
                    
                    isGameOver = true;
                    if (score > highScore) highScore = Math.floor(score);
                }
            }

            // 画面外に出た障害物を削除
            obstacles = obstacles.filter(obs => obs.x + obs.width > 0);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 地面の線を描く
            ctx.beginPath();
            ctx.moveTo(0, GROUND_Y);
            ctx.lineTo(canvas.width, GROUND_Y);
            ctx.strokeStyle = "#555";
            ctx.lineWidth = 1;
            ctx.stroke();

            player.draw();

            for (let obs of obstacles) {
                obs.draw();
            }

            // スコア表示 (ゼロ埋め表示)
            ctx.fillStyle = "#555";
            ctx.font = "bold 20px 'Courier New', monospace";
            ctx.textAlign = "right";
            
            let displayScore = Math.floor(score).toString().padStart(5, '0');
            let displayHigh = highScore.toString().padStart(5, '0');
            
            ctx.fillText("HI " + displayHigh + "  " + displayScore, canvas.width - 20, 30);
            ctx.textAlign = "left"; // 元に戻す

            // ゲームオーバー画面
            if (isGameOver) {
                ctx.fillStyle = "#333";
                ctx.textAlign = "center";
                
                ctx.font = "bold 30px sans-serif";
                ctx.fillText("G A M E   O V E R", canvas.width / 2, canvas.height / 2 - 20);
                
                ctx.font = "16px sans-serif";
                ctx.fillText("スペースキー または ↑キー でリトライ", canvas.width / 2, canvas.height / 2 + 20);
                
                ctx.textAlign = "left";
            }
        }

        function loop() {
            update();
            draw();
            if (!isGameOver) {
                requestAnimationFrame(loop);
            }
        }

        // 初回起動
        draw(); // 最初は止まった状態で描画
    </script>
</body>
</html>
