<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ﾏｰﾏｰタイピング - ﾏｰ PORTAL</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            background: #0f0f1a;
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        header {
            width: 100%;
            background: #1a1a2e;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #00f0ff;
        }
        .back-btn {
            background: #00f0ff;
            color: #0f0f1a;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            font-size: 13px;
        }
        .game-container {
            width: 100%;
            max-width: 750px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        /* スコアボード */
        .scoreboard {
            display: flex;
            gap: 30px;
            background: #16213e;
            padding: 12px 25px;
            border-radius: 10px;
            border: 1px solid #0f3460;
            margin-bottom: 25px;
            font-size: 15px;
            font-weight: bold;
        }
        .score-item span {
            color: #ffd700;
        }
        /* タイピング表示エリア */
        .typing-box {
            background: #1a1a2e;
            border: 3px solid #e94560;
            border-radius: 15px;
            padding: 30px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(233,69,96,0.3);
            position: relative;
        }
        .kanji-text {
            font-size: 30px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 8px;
            min-height: 40px;
        }
        .roma-display {
            font-size: 22px;
            font-family: monospace;
            letter-spacing: 2px;
            margin-bottom: 10px;
            word-break: break-all;
        }
        .typed {
            color: #00f0ff;
            text-shadow: 0 0 8px rgba(0,240,255,0.5);
        }
        .untyped {
            color: #666;
        }
        .char-img {
            font-size: 45px;
            margin-bottom: 15px;
        }
        /* スタート・リザルト画面オーバーレイ */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15,15,26,0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 13px;
            z-index: 10;
        }
        .overlay h2 {
            font-size: 26px;
            color: #ffd700;
            margin-bottom: 10px;
        }
        .overlay p {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 20px;
            text-align: center;
            line-height: 1.6;
        }
        .action-btn {
            background: #e94560;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .action-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <header>
        <a href="ma-jack" class="back-btn">⬅ ポータルへ戻る</a>
        <div style="font-weight: bold; color: #00f0ff;">⌨ ﾏｰﾏｰタイピング</div>
    </header>

    <div class="game-container">
        <!-- スコアボード -->
        <div class="scoreboard">
            <div class="score-item">⏱️ 残り時間: <span id="time-display">30</span>秒</div>
            <div class="score-item">💰 獲得ポイント: <span id="score-display">0</span> pt</div>
            <div class="score-item">✨ コンボ: <span id="combo-display">0</span></div>
        </div>

        <!-- メインタイピング盤面 -->
        <div class="typing-box" id="typing-box">
            <div class="char-img" id="char-img">(´ω`)</div>
            <div class="kanji-text" id="kanji-display">スペースキーでスタート</div>
            <div class="roma-display" id="roma-display">PRESS SPACE TO START</div>

            <!-- スタート・終了画面 -->
            <div class="overlay" id="start-overlay">
                <h2>ﾏｰﾏｰタイピング開幕！</h2>
                <p>記号や数字も含めて完全自動判定！<br>制限時間内にフレーズを打ちまくれ！</p>
                <button class="action-btn" onclick="startGame()">ゲームスタート</button>
            </div>

            <div class="overlay" id="result-overlay" style="display: none;">
                <h2>タイムアップ！ 🎉</h2>
                <p id="result-text">スコア: 0 pt</p>
                <button class="action-btn" onclick="startGame()">もう一度プレイ</button>
            </div>
        </div>
    </div>

    <script>
        // ========================================================
        // 🧩【カスタム用ブロック】フレーズリスト
        // ========================================================
        const WORD_DATABASE = [
            { text: "うおw", hira: "うおw" },
            { text: "どわー笑", hira: "どわーわらう" },
            { text: "ったく…w", hira: "ったく…w" },
            { text: "かっこよw", hira: "かっこよw" },
            { text: "えぐー！笑", hira: "えぐー！わらう" },
            { text: "冗談ですやん！！w", hira: "じょうだんですやん！！w" },
            { text: "きちーww", hira: "きちーww" },
            { text: "おもろいなあ！ww", hira: "おもろいなあ！ww" },
            { text: "ど、どした？笑", hira: "ど、どした？わらう" },
            { text: "ちょw1回落ち着けw落ち着けw", hira: "ちょw1かいおちつけwおちつけw" },
            { text: "ええてw", hira: "ええてw" },
            { text: "ちょwお前必死やんww", hira: "ちょwおまえひっしやんww" },
            { text: "すごいなあキミww", hira: "すごいなあきみww" },
            { text: "ちょw怒んなやw", hira: "ちょwおこんなやw" }
        ];

        // --- ローマ字自動生成エンジン（記号・数字・全角半角の揺れ完全対応） ---
        const KANA_TABLE = {
            'あ': ['a'], 'い': ['i', 'yi'], 'う': ['u', 'wu', 'whu'], 'え': ['e'], 'お': ['o'],
            'か': ['ka', 'ca'], 'き': ['ki'], 'く': ['ku', 'cu', 'qu'], 'け': ['ke'], 'こ': ['ko', 'co'],
            'さ': ['sa'], 'し': ['shi', 'si', 'ci'], 'す': ['su'], 'せ': ['se', 'ce'], 'そ': ['so'],
            'た': ['ta'], 'ち': ['chi', 'ti'], 'つ': ['tsu', 'tu'], 'て': ['te'], 'と': ['to'],
            'な': ['na'], 'に': ['ni'], 'ぬ': ['nu'], 'ね': ['ne'], 'の': ['no'],
            'は': ['ha'], 'ひ': ['hi'], 'ふ': ['hu', 'fu'], 'へ': ['he'], 'ほ': ['ho'],
            'ま': ['ma'], 'み': ['mi'], 'む': ['mu'], 'め': ['me'], 'も': ['mo'],
            'や': ['ya'], 'ゆ': ['yu'], 'よ': ['yo'],
            'ら': ['ra'], 'り': ['ri'], 'る': ['ru'], 'れ': ['re'], 'ろ': ['ro'],
            'わ': ['wa'], 'を': ['wo'], 'ん': ['nn', 'n\'', 'n'],
            'が': ['ga'], 'ぎ': ['gi'], 'ぐ': ['gu'], 'げ': ['ge'], 'ご': ['go'],
            'ざ': ['za'], 'じ': ['ji', 'zi'], 'ず': ['zu'], 'ぜ': ['ze'], 'ぞ': ['zo'],
            'だ': ['da'], 'ぢ': ['di'], 'づ': ['du'], 'で': ['de'], 'ど': ['do'],
            'ば': ['ba'], 'び': ['bi'], 'ぶ': ['bu'], 'べ': ['be'], 'ぼ': ['bo'],
            'ぱ': ['pa'], 'ぴ': ['pi'], 'ぷ': ['pu'], 'ぺ': ['pe'], 'ぽ': ['po'],
            'きゃ': ['kya', 'kilya'], 'きゅ': ['kyu', 'kilyu'], 'きょ': ['kyo', 'kilyo'],
            'しゃ': ['sha', 'sya', 'silya'], 'しゅ': ['shu', 'syu', 'silya'], 'しょ': ['sho', 'syo', 'silyo'],
            'ちゃ': ['cha', 'tya', 'cya'], 'ちゅ': ['chu', 'tyu', 'cyu'], 'ちょ': ['cho', 'tyo', 'cyo'],
            'にゃ': ['nya'], 'にゅ': ['nyu'], 'にょ': ['nyo'],
            'ひゃ': ['hya'], 'ひゅ': ['hyu'], 'ひょ': ['hyo'],
            'みゃ': ['mya'], 'みゅ': ['myu'], 'みょ': ['myo'],
            'りゃ': ['rya'], 'りゅ': ['ryu'], 'りょ': ['ryo'],
            'ぎゃ': ['gya'], 'ぎゅ': ['gyu'], 'ぎょ': ['gyo'],
            'じゃ': ['ja', 'zya', 'jya'], 'じゅ': ['ju', 'zyu', 'jyu'], 'じょ': ['jo', 'zyo', 'jyo'],
            'びゃ': ['bya'], 'びゅ': ['byu'], 'びょ': ['byo'],
            'ぴゃ': ['pya'], 'ぴゅ': ['pyu'], 'ぴょ': ['pyo'],
            'っ': ['xtu', 'xtsu', 'ltu', 'ltsu'],
            'ぁ': ['xa', 'la'], 'ぃ': ['xi', 'li', 'xlyi'], 'ぅ': ['xu', 'lu'], 'ぇ': ['xe', 'le', 'xlye'], 'ぉ': ['xo', 'lo'],
            'ゃ': ['xya', 'lya'], 'ゅ': ['xyu', 'lyu'], 'ょ': ['xyo', 'lyo'], 'ー': ['-', '^'],
            // --- 記号・数字の全角半角救済マッピング ---
            '！': ['!'], '!': ['!'],
            '？': ['?'], '?': ['?'],
            '，': [','], ',': [','],
            '、': [','], '。': ['.'],
            '…': ['...', '...'], '.': ['.'],
            'ｗ': ['w'], 'w': ['w'],
            '１': ['1'], '1': ['1'],
            '２': ['2'], '2': ['2'],
            '３': ['3'], '3': ['3'],
            '４': ['4'], '4': ['4'],
            '５': ['5'], '5': ['5'],
            '６': ['6'], '6': ['6'],
            '７': ['7'], '7': ['7'],
            '８': ['8'], '8': ['8'],
            '９': ['9'], '9': ['9'],
            '０': ['0'], '0': ['0']
        };

        // ローマ字自動生成ツリー
        function generateRomaVariants(hiraStr) {
            let currentPaths = [""];
            let i = 0;
            while (i < hiraStr.length) {
                let sub3 = hiraStr.substr(i, 3); // 「…」などのため3文字分も考慮
                let sub2 = hiraStr.substr(i, 2);
                let sub1 = hiraStr.substr(i, 1);
                
                // 促音（っ+子音）
                if (sub1 === 'っ' && i + 1 < hiraStr.length) {
                    let nextChar = hiraStr.substr(i + 1, 1);
                    let nextTrans = KANA_TABLE[nextChar] || [nextChar];
                    let newPaths = [];
                    currentPaths.forEach(path => {
                        nextTrans.forEach(nt => {
                            let firstLetter = nt[0];
                            let tsuOpts = ['xtu', 'xtsu', 'ltu', 'ltsu', firstLetter];
                            tsuOpts.forEach(to => {
                                newPaths.push(path + to);
                            });
                        });
                    });
                    currentPaths = newPaths;
                    i++;
                    continue;
                }

                let matchKey = null;
                let matchTrans = null;

                if (i + 2 < hiraStr.length && KANA_TABLE[sub3]) {
                    matchKey = sub3;
                    matchTrans = KANA_TABLE[sub3];
                    i += 3;
                } else if (i + 1 < hiraStr.length && KANA_TABLE[sub2]) {
                    matchKey = sub2;
                    matchTrans = KANA_TABLE[sub2];
                    i += 2;
                } else if (KANA_TABLE[sub1]) {
                    matchKey = sub1;
                    matchTrans = KANA_TABLE[sub1];
                    i += 1;
                } else {
                    matchKey = sub1;
                    matchTrans = [sub1];
                    i += 1;
                }

                let newPaths = [];
                currentPaths.forEach(path => {
                    matchTrans.forEach(tr => {
                        newPaths.push(path + tr);
                    });
                });
                currentPaths = newPaths;
            }
            return currentPaths;
        }

        // --- Web Audio API (SE生成) ---
        let audioCtx = null;
        function playTypingSe(success = true) {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = success ? 'sine' : 'sawtooth';
                osc.frequency.setValueAtTime(success ? 600 : 150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(success ? 900 : 80, audioCtx.currentTime + 0.05);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.05);
            } catch(e){}
        }

        // --- ゲーム制御変数 ---
        let timer = 30;
        let score = 0;
        let combo = 0;
        let isPlaying = false;
        let gameInterval = null;
        
        let currentWord = {};
        let activeRomaList = [];
        let currentRoma = "";
        let typedIndex = 0;

        function startGame() {
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('result-overlay').style.display = 'none';
            timer = 30;
            score = 0;
            combo = 0;
            isPlaying = true;
            
            updateScoreBoard();
            nextWord();

            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(() => {
                timer--;
                updateScoreBoard();
                if (timer <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            isPlaying = false;
            clearInterval(gameInterval);
            playTypingSe(true);
            document.getElementById('result-text').innerText = `獲得スコア: ${score} pt\n最大コンボ: ${combo}`;
            document.getElementById('result-overlay').style.display = 'flex';
        }

        function updateScoreBoard() {
            document.getElementById('time-display').innerText = timer;
            document.getElementById('score-display').innerText = score;
            document.getElementById('combo-display').innerText = combo;
        }

        function nextWord() {
            let randomIndex = Math.floor(Math.random() * WORD_DATABASE.length);
            currentWord = WORD_DATABASE[randomIndex];
            
            activeRomaList = generateRomaVariants(currentWord.hira);
            typedIndex = 0;
            currentRoma = activeRomaList[0];
            renderWord();
        }

        function renderWord() {
            document.getElementById('kanji-display').innerText = currentWord.text;
            
            let typedPart = currentRoma.substring(0, typedIndex);
            let untypedPart = currentRoma.substring(typedIndex);
            
            document.getElementById('roma-display').innerHTML = 
                `<span class="typed">${typedPart}</span><span class="untyped">${untypedPart}</span>`;
            
            const faces = ["(´ω`)", "( ˘ω˘ )", "(ﾉД`)", "(ﾟ∀ﾟ)", "(；ω；)"];
            document.getElementById('char-img').innerText = faces[Math.floor(Math.random() * faces.length)];
        }

        // --- キー入力判定 ---
        window.addEventListener('keydown', (e) => {
            if (!isPlaying) return;
            if (e.key.length > 1) return;

            let inputChar = e.key.toLowerCase();
            let matched = false;
            let nextValidRoma = "";

            let validCandidates = [];
            for (let roma of activeRomaList) {
                let currentTyped = currentRoma.substring(0, typedIndex);
                if (roma.startsWith(currentTyped + inputChar)) {
                    validCandidates.push(roma);
                    if (roma[typedIndex] === inputChar) {
                        matched = true;
                        nextValidRoma = roma;
                    }
                }
            }

            if (matched) {
                currentRoma = nextValidRoma;
                typedIndex++;
                combo++;
                score += 100 * Math.min(combo, 10);
                playTypingSe(true);
                renderWord();

                if (typedIndex >= currentRoma.length) {
                    score += 500;
                    setTimeout(nextWord, 100);
                }
            } else {
                combo = 0;
                playTypingSe(false);
                updateScoreBoard();
            }
        });
    </script>
</body>
</html>
