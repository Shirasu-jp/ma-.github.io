<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ﾏｰﾏｰタイピング - ﾏｰ PORTAL</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            background: #0f0f1a;
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        header {
            width: 100%;
            background: #1a1a2e;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #00f0ff;
        }
        .back-btn {
            background: #00f0ff;
            color: #0f0f1a;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            font-size: 13px;
        }
        .game-container {
            width: 100%;
            max-width: 700px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        /* スコアボード */
        .scoreboard {
            display: flex;
            gap: 30px;
            background: #16213e;
            padding: 12px 25px;
            border-radius: 10px;
            border: 1px solid #0f3460;
            margin-bottom: 25px;
            font-size: 15px;
            font-weight: bold;
        }
        .score-item span {
            color: #ffd700;
        }
        /* タイピング表示エリア */
        .typing-box {
            background: #1a1a2e;
            border: 3px solid #e94560;
            border-radius: 15px;
            padding: 30px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(233,69,96,0.3);
            position: relative;
        }
        .kanji-text {
            font-size: 32px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 10px;
            min-height: 45px;
        }
        .roma-display {
            font-size: 24px;
            font-family: monospace;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
        .typed {
            color: #00f0ff;
            text-shadow: 0 0 8px rgba(0,240,255,0.5);
        }
        .untyped {
            color: #666;
        }
        .char-img {
            font-size: 50px;
            margin-bottom: 15px;
        }
        /* スタート・リザルト画面オーバーレイ */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15,15,26,0.92);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 13px;
            z-index: 10;
        }
        .overlay h2 {
            font-size: 26px;
            color: #ffd700;
            margin-bottom: 10px;
        }
        .overlay p {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 20px;
            text-align: center;
            line-height: 1.6;
        }
        .action-btn {
            background: #e94560;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .action-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-btn">⬅ ポータルへ戻る</a>
        <div style="font-weight: bold; color: #00f0ff;">⌨ ﾏｰﾏｰタイピング</div>
    </header>

    <div class="game-container">
        <!-- スコアボード -->
        <div class="scoreboard">
            <div class="score-item">⏱️ 残り時間: <span id="time-display">30</span>秒</div>
            <div class="score-item">💰 獲得ポイント: <span id="score-display">0</span> pt</div>
            <div class="score-item">✨ 콤ボ: <span id="combo-display">0</span></div>
        </div>

        <!-- メインタイピング盤面 -->
        <div class="typing-box" id="typing-box">
            <div class="char-img" id="char-img">(´ω`)</div>
            <div class="kanji-text" id="kanji-display">スペースキーでスタート</div>
            <div class="roma-display" id="roma-display">PRESS SPACE TO START</div>

            <!-- スタート・終了画面 -->
            <div class="overlay" id="start-overlay">
                <h2>ﾏｰﾏｰタイピング開幕！</h2>
                <p>制限時間内に文字を打ちまくって高得点を目指せ！<br>どんな入力方式でもスムーズに判定されるぞ。</p>
                <button class="action-btn" onclick="startGame()">ゲームスタート</button>
            </div>

            <div class="overlay" id="result-overlay" style="display: none;">
                <h2>タイムアップ！ 🎉</h2>
                <p id="result-text">スコア: 0 pt</p>
                <button class="action-btn" onclick="startGame()">もう一度プレイ</button>
            </div>
        </div>
    </div>

    <script>
        // ========================================================
        // 🧩【カスタム用ブロック】ここに好きな単語・問題を追加できます！
        // 引数: { text: "画面に表示する漢字や言葉", roma: ["第一候補のローマ字", "別解ローマ字(任意)"] }
        // ========================================================
        const WORD_DATABASE = [
    {
        text: "うおw",
        roma: ["uow", "uohw", "uwo"]
    },
    {
        text: "どわー笑",
        roma: ["dowarewarau", "dowa-warau", "dowawa", "dowa-s", "dowarw"]
    },
    {
        text: "ったく…w",
        roma: ["ttaku...w", "ttaku...u", "ttakuw", "ttaku...", "ttakuw"]
    },
    {
        text: "かっこよw",
        roma: ["kakkoyow", "kakkoyo-w", "kakuyow", "kakkoyou"]
    },
    {
        text: "えぐー！笑",
        roma: ["egu-!warau", "eg-!s", "eguwarau", "eguseyo", "egu!w"]
    },
    {
        text: "冗談ですやん！！w",
        roma: ["joudandesuyann!!w", "jyoudandesujann!!w", "jyoudandesuyariw", "joudandesuyandesu"]
    },
    {
        text: "きちーww",
        roma: ["kichiiww", "kichiiwww", "kichiw", "kichiiw"]
    },
    {
        text: "おもろいなあ！ww",
        roma: ["omoroinaa!ww", "omoroinaaww", "omoroinaaa!ww", "omoroinaasumile"]
    },
    {
        text: "ど、どした？笑",
        roma: ["do,doshita?warau", "do,doshita?s", "dodoshita?w", "do,doshitaw"]
    },
    {
        text: "ちょw1回落ち着けw落ち着けw",
        roma: ["chow1kaiochitsukewochitsukew", "chowikkaiochitsukewochitsukew", "chow1kaiochitsukeochitsuke"]
    },
    {
        text: "ええてw",
        roma: ["eetew", "eetewarau", "eete-w", "eeteww"]
    },
    {
        text: "ちょwお前必死やんww",
        roma: ["chowomaehisshiyannww", "chowomaehisshiyainww", "chowomaehisshiyannwww"]
    },
    {
        text: "すごいなあキミww",
        roma: ["sugoinaakimiww", "sugoinaakimiwww", "sugoinaakimiw"]
    },
    {
        text: "ちょw怒んなやw",
        roma: ["chowokonnayaw", "chowokonnayawarau", "chowokonnayasw"]
    }
        ];

        // --- Web Audio API (SE生成) ---
        let audioCtx = null;
        function playTypingSe(success = true) {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = success ? 'sine' : 'sawtooth';
                osc.frequency.setValueAtTime(success ? 600 : 150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(success ? 900 : 80, audioCtx.currentTime + 0.05);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.05);
            } catch(e){}
        }

        // --- ゲーム制御変数 ---
        let timer = 30;
        let score = 0;
        let combo = 0;
        let isPlaying = false;
        let gameInterval = null;
        
        let currentWord = {};
        let currentRoma = "";
        let typedIndex = 0;

        function startGame() {
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('result-overlay').style.display = 'none';
            timer = 30;
            score = 0;
            combo = 0;
            isPlaying = true;
            
            updateScoreBoard();
            nextWord();

            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(() => {
                timer--;
                updateScoreBoard();
                if (timer <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            isPlaying = false;
            clearInterval(gameInterval);
            playTypingSe(true);
            document.getElementById('result-text').innerText = `獲得スコア: ${score} pt\n最大コンボ: ${combo}`;
            document.getElementById('result-overlay').style.display = 'flex';
        }

        function updateScoreBoard() {
            document.getElementById('time-display').innerText = timer;
            document.getElementById('score-display').innerText = score;
            document.getElementById('combo-display').innerText = combo;
        }

        // ランダムな単語をチョイス
        function nextWord() {
            let randomIndex = Math.floor(Math.random() * WORD_DATABASE.length);
            currentWord = WORD_DATABASE[randomIndex];
            typedIndex = 0;
            // 最初のローマ字候補を初期ターゲットに設定
            currentRoma = currentWord.roma[0];
            renderWord();
        }

        function renderWord() {
            document.getElementById('kanji-display').innerText = currentWord.text;
            
            let typedPart = currentRoma.substring(0, typedIndex);
            let untypedPart = currentRoma.substring(typedIndex);
            
            document.getElementById('roma-display').innerHTML = 
                `<span class="typed">${typedPart}</span><span class="untyped">${untypedPart}</span>`;
            
            // ランダムにﾏｰの顔が変わる演出
            const faces = ["(´ω`)", "( ˘ω˘ )", "(ﾉД`)", "(ﾟ∀ﾟ)", "(；ω；)"];
            document.getElementById('char-img').innerText = faces[Math.floor(Math.random() * faces.length)];
        }

        // --- キー入力判定 (どんな入力方式でも柔軟に受け付ける寿司打方式) ---
        window.addEventListener('keydown', (e) => {
            if (!isPlaying) return;
            // ファンクションキーや特殊キーは無視
            if (e.key.length > 1) return;

            let inputChar = e.key.toLowerCase();
            
            // 現在の入力位置に合致するかチェック（複数ローマ字パターンの救済）
            let matched = false;
            let activeRoma = currentRoma;

            // ユーザーが打った文字が、登録されているどのローマ字パターンの続きに一致するか確認
            for (let romaPattern of currentWord.roma) {
                if (romaPattern.startsWith(activeRoma.substring(0, typedIndex) + inputChar)) {
                    // もし別パターンのほうが進みが良い、あるいは一致するならそこに切り替え可能
                    currentRoma = romaPattern;
                    matched = true;
                    break;
                }
            }

            if (matched && currentRoma[typedIndex] === inputChar) {
                // 正解
                typedIndex++;
                combo++;
                score += 100 * Math.min(combo, 10); // コンボボーナス
                playTypingSe(true);
                renderWord();

                // 単語クリア判定
                if (typedIndex >= currentRoma.length) {
                    score += 500; // 単語クリアボーナス
                    setTimeout(nextWord, 100);
                }
            } else {
                // ミス
                combo = 0;
                playTypingSe(false);
                updateScoreBoard();
            }
        });
    </script>
</body>
</html>
