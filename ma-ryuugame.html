<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>(´ω`)ﾏｰ ザ・ダイナソー</title>
    <style>
        body {
            text-align: center;
            background-color: #f7f7f7;
            font-family: 'Courier New', Courier, monospace, sans-serif;
            margin-top: 50px;
            color: #333;
        }
        canvas {
            background-color: #ffffff;
            border-bottom: 2px solid #555;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.05);
        }
        #info {
            margin-top: 20px;
            font-weight: bold;
            line-height: 1.6;
        }
        kbd {
            background-color: #eee;
            border: 1px solid #ccc;
            border-radius: 3px;
            padding: 2px 6px;
            font-size: 0.9em;
        }
        /* リスタートボタンのスタイル */
        #restartBtn {
            display: none; /* 通常時は隠す */
            margin: 15px auto;
            padding: 10px 25px;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            background-color: #ff6347; /* 目立つトマト色 */
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.15);
            transition: background 0.2s;
        }
        #restartBtn:hover {
            background-color: #e54d30;
        }
    </style>
</head>
<body>
    <h2>(´ω`)ﾏｰ ザ・ダイナソー</h2>
    <canvas id="gameCanvas" width="800" height="250"></canvas>
    
    <!-- 追加したリスタートボタン -->
    <div>
        <button id="restartBtn" onclick="resetGame()">もう一度遊ぶ (´ω`)ﾏｰ</button>
    </div>

    <div id="info">
        ジャンプ: <kbd>Space</kbd> / <kbd>↑</kbd> ｜ しゃがむ: <kbd>↓</kbd> (長押し)<br>
        ※ジャンプ中に <kbd>↓</kbd> で急降下します
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const restartBtn = document.getElementById("restartBtn");

        let gameSpeed = 5.5; // 初期速度を少しだけマイルドに
        let score = 0;
        let highScore = 0;
        let isGameOver = false;
        let frame = 0;
        let nextSpawn = 0;

        const TEXT_NORMAL = "(´ω`)ﾏｰ";
        const TEXT_DUCK = "(＿ω＿)ﾏｰ";
        const ENEMY_GROUND = "(ﾟДﾟ)";
        const ENEMY_FLYING = "⊂(ﾟДﾟ)⊃";

        const GROUND_Y = 220;
        const FONT_STYLE = "bold 24px sans-serif";

        ctx.font = FONT_STYLE;

        const player = {
            x: 50,
            y: GROUND_Y - 30,
            width: ctx.measureText(TEXT_NORMAL).width,
            height: 30,
            dy: 0,
            gravity: 0.5,       // 重力を少し軽く（滞空時間を長めに）
            jumpPower: -11,     // ジャンプ力を強化
            isJumping: false,
            isDucking: false,
            
            draw() {
                ctx.fillStyle = "#333";
                ctx.font = FONT_STYLE;
                ctx.textBaseline = "top";
                if (this.isDucking) {
                    this.height = 15;
                    ctx.fillText(TEXT_DUCK, this.x, this.y + 15);
                } else {
                    this.height = 30;
                    ctx.fillText(TEXT_NORMAL, this.x, this.y);
                }
            }
        };

        let obstacles = [];

        class Obstacle {
            constructor(type) {
                this.x = canvas.width;
                this.type = type; 
                
                ctx.font = FONT_STYLE;
                
                if (this.type === 0) {
                    this.text = ENEMY_GROUND;
                    this.width = ctx.measureText(this.text).width;
                    this.height = 28;
                    this.y = GROUND_Y - this.height;
                } else {
                    this.text = ENEMY_FLYING;
                    this.width = ctx.measureText(this.text).width;
                    this.height = 20;
                    this.y = (this.type === 1) ? GROUND_Y - 45 : GROUND_Y - 75;
                }
            }

            update() {
                this.x -= gameSpeed;
            }

            draw() {
                ctx.fillStyle = this.type === 0 ? "#D2691E" : "#4682B4";
                ctx.font = FONT_STYLE;
                ctx.textBaseline = "top";
                ctx.fillText(this.text, this.x, this.y);
            }
        }

        function resetGame() {
            player.y = GROUND_Y - 30;
            player.dy = 0;
            player.isJumping = false;
            player.isDucking = false;
            obstacles = [];
            score = 0;
            gameSpeed = 5.5;
            frame = 0;
            nextSpawn = 50;
            isGameOver = false;
            restartBtn.style.display = "none"; // ボタンを隠す
            loop();
        }

        const keys = {};
        window.addEventListener("keydown", (e) => {
            keys[e.code] = true;
            
            if (isGameOver && (e.code === "Space" || e.code === "ArrowUp")) {
                resetGame();
                return;
            }

            if ((e.code === "Space" || e.code === "ArrowUp") && !player.isJumping && !player.isDucking) {
                player.dy = player.jumpPower;
                player.isJumping = true;
            }
        });

        window.addEventListener("keyup", (e) => {
            keys[e.code] = false;
        });

        function update() {
            if (isGameOver) return;

            gameSpeed += 0.001;
            score += 0.1;

            if (keys["ArrowDown"]) {
                if (player.isJumping) {
                    player.dy += player.gravity * 2; 
                } else {
                    player.isDucking = true;
                }
            } else {
                player.isDucking = false;
            }

            player.dy += player.gravity;
            player.y += player.dy;

            if (player.y >= GROUND_Y - player.height && !player.isDucking) {
                player.y = GROUND_Y - player.height;
                player.dy = 0;
                player.isJumping = false;
            } else if (player.y >= GROUND_Y - 30 && player.isDucking) {
                player.y = GROUND_Y - 30;
                player.dy = 0;
                player.isJumping = false;
            }

            frame++;
            if (frame >= nextSpawn) {
                let type = 0;
                if (score > 150) { 
                    if (Math.random() < 0.25) type = 1;
                    else if (Math.random() < 0.25) type = 2;
                }
                
                obstacles.push(new Obstacle(type));
                
                let minFrames = Math.max(50, 110 - gameSpeed * 5);
                let maxFrames = Math.max(90, 190 - gameSpeed * 5);
                nextSpawn = frame + Math.floor(Math.random() * (maxFrames - minFrames + 1) + minFrames);
            }

            // 【超重要】当たり判定の計算を修正（文字の見た目より判定をひと回り小さく）
            let pLeft = player.x + 18;
            let pRight = player.x + player.width - 18;
            let pTop = player.y + 6;
            let pBottom = player.y + player.height;

            for (let i = 0; i < obstacles.length; i++) {
                let obs = obstacles[i];
                obs.update();

                let oLeft = obs.x + 12;
                let oRight = obs.x + obs.width - 12;
                let oTop = obs.y + 6;
                let oBottom = obs.y + obs.height;

                // 衝突判定（タイポを修正）
                if (pLeft < oRight && pRight > oLeft && pTop < oBottom && pBottom > oTop) {
                    isGameOver = true;
                    if (score > highScore) highScore = Math.floor(score);
                    restartBtn.style.display = "block"; // ボタンを表示
                }
            }

            obstacles = obstacles.filter(obs => obs.x + obs.width > 0);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.beginPath();
            ctx.moveTo(0, GROUND_Y);
            ctx.lineTo(canvas.width, GROUND_Y);
            ctx.strokeStyle = "#555";
            ctx.lineWidth = 1;
            ctx.stroke();

            player.draw();

            for (let obs of obstacles) {
                obs.draw();
            }

            ctx.fillStyle = "#555";
            ctx.font = "bold 20px 'Courier New', monospace";
            ctx.textAlign = "right";
            
            let displayScore = Math.floor(score).toString().padStart(5, '0');
            let displayHigh = highScore.toString().padStart(5, '0');
            
            ctx.fillText("HI " + displayHigh + "  " + displayScore, canvas.width - 20, 30);
            ctx.textAlign = "left";

            if (isGameOver) {
                ctx.fillStyle = "#333";
                ctx.textAlign = "center";
                ctx.font = "bold 30px sans-serif";
                ctx.fillText("G A M E   O V E R", canvas.width / 2, canvas.height / 2 - 20);
                ctx.font = "16px sans-serif";
                ctx.fillText("下のボタンかスペースキーでリトライ", canvas.width / 2, canvas.height / 2 + 20);
                ctx.textAlign = "left";
            }
        }

        function loop() {
            update();
            draw();
            if (!isGameOver) {
                requestAnimationFrame(loop);
            }
        }

        loop();
    </script>
</body>
</html>
