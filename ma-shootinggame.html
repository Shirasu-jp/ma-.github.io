<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALAXY SHOOTER -EXTREME-</title>
    <style>
        body {
            text-align: center;
            background-color: #03030c;
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
            margin: 0;
            padding: 20px 0;
            user-select: none;
            touch-action: none;
        }
        h1 {
            color: #00f0ff;
            margin: 5px 0;
            text-shadow: 0 0 15px rgba(0, 240, 255, 0.7);
            font-size: 26px;
        }
        canvas {
            background-color: #010105;
            border: 3px solid #00f0ff;
            border-radius: 10px;
            display: block;
            margin: 0 auto;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.4);
            cursor: crosshair;
            max-width: 100%;
            height: auto;
        }
        .note {
            color: #666;
            font-size: 12px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <h1>GALAXY SHOOTER -EXTREME-</h1>
    <canvas id="gameCanvas" width="480" height="640"></canvas>
    <div class="note">※PCはマウス移動、スマホは画面をスライドして操作（自動連射）</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // --- 1. 永続セーブデータ管理 (LocalStorage) ---
        const SAVE_KEY = "galaxy_shooter_extreme_v1";
        let gameState = "TITLE"; 
        
        let playerSave = {
            coins: 0,
            highScore: 0,
            upgrades: { hp: 0, speed: 0, weapon: 0, shield: 0 }, 
            achievements: { first_boss: false, max_upgrade: false, coin_hunter: false, survivor: false, stage3_clear: false, no_damage_s1: false },
            stats: { total_kills: 0, total_coins: 0 }
        };

        function loadGame() {
            const saved = localStorage.getItem(SAVE_KEY);
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    playerSave = { ...playerSave, ...parsed };
                    playerSave.upgrades = { ...playerSave.upgrades, ...parsed.upgrades };
                    playerSave.achievements = { ...playerSave.achievements, ...parsed.achievements };
                    playerSave.stats = { ...playerSave.stats, ...parsed.stats };
                } catch(e) { console.error("Save load failed", e); }
            }
        }

        function saveGame() {
            localStorage.setItem(SAVE_KEY, JSON.stringify(playerSave));
        }

        // --- 2. ゲーム内変数設定 ---
        let score = 0;
        let currentStage = 1; 
        let stageProgress = 0; 
        let isBossBattle = false;
        let isNoDamageRun = true; 
        let frame = 0;
        let shakeTimer = 0;
        let shakeIntensity = 0;
        let warningTimer = 0;

        let player = { x: 210, y: 500, w: 40, h: 40, hp: 3, maxHp: 3, speed: 5, weapon: 1, shield: 0 };
        let bullets = [];
        let enemyBullets = [];
        let enemies = [];
        let particles = [];
        let items = [];
        let stars = [];
        let shootCooldown = 0;

        const shopConfig = {
            hp:     { name: "MAX HP",     prices: [150, 300, 500, 800, 1200], values: [3, 4, 5, 6, 7, 8] },
            speed:  { name: "ENGINE SPEED",prices: [100, 200, 400, 600, 1000], values: [5, 5.8, 6.6, 7.4, 8.2, 9.0] },
            weapon: { name: "WEAPON SYSTEM",prices: [250, 500, 800, 1200, 2000], values: [1, 2, 3, 4, 5, 6] }, 
            shield: { name: "START SHIELD",prices: [150, 250, 450, 700, 1100], values: [0, 1, 2, 3, 4, 5] }
        };

        for(let i=0; i<50; i++) {
            stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2.5+0.5 });
        }

        // --- 3. エフェクト関数群 ---
        function triggerShake(duration, intensity) {
            shakeTimer = duration;
            shakeIntensity = intensity;
        }

        function spawnExplosion(x, y, color, count=12) {
            for(let i=0; i<count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 4 + 1;
                particles.push({
                    x: x, y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: Math.floor(Math.random() * 20) + 15,
                    color: color,
                    size: Math.random() * 3 + 1
                });
            }
        }

        // --- 4. マウス・タッチUI当たり判定用 ---
        let mouseX = 0, mouseY = 0;
        let UI_Buttons = [];

        function addBtn(id, x, y, w, h, text, color="#00f0ff") {
            UI_Buttons.push({ id, x, y, w, h, text, color });
        }

        function drawButtons() {
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            UI_Buttons.forEach(b => {
                let isHover = (mouseX >= b.x && mouseX <= b.x+b.w && mouseY >= b.y && mouseY <= b.y+b.h);
                ctx.fillStyle = isHover ? "rgba(0, 240, 255, 0.2)" : "rgba(255,255,255,0.05)";
                ctx.fillRect(b.x, b.y, b.w, b.h);
                ctx.strokeStyle = b.color;
                ctx.lineWidth = isHover ? 2 : 1;
                ctx.strokeRect(b.x, b.y, b.w, b.h);
                ctx.fillStyle = b.color;
                ctx.font = "bold 15px sans-serif";
                ctx.fillText(b.text, b.x + b.w/2, b.y + b.h/2);
            });
        }

        function handleCanvasClick(cx, cy) {
            UI_Buttons.forEach(b => {
                if(cx >= b.x && cx <= b.x+b.w && cy >= b.y && cy <= b.y+b.h) {
                    executeButtonAction(b.id);
                }
            });
        }

        // --- 5. ゲームの初期化・再開 ---
        function initPlaySession() {
            score = 0;
            currentStage = 1;
            stageProgress = 0;
            isBossBattle = false;
            isNoDamageRun = true;
            startStageCommon();
        }

        // 次のステージへ進む処理（ステージ数とスコアを引き継ぐ）
        function startNextStage() {
            stageProgress = 0;
            isBossBattle = false;
            startStageCommon();
        }

        function startStageCommon() {
            bullets = [];
            enemyBullets = [];
            enemies = [];
            items = [];
            particles = [];
            
            player.maxHp = shopConfig.hp.values[playerSave.upgrades.hp];
            player.hp = player.maxHp;
            player.speed = shopConfig.speed.values[playerSave.upgrades.speed];
            player.weapon = shopConfig.weapon.values[playerSave.upgrades.weapon];
            player.shield = shopConfig.shield.values[playerSave.upgrades.shield];
            
            player.x = canvas.width / 2 - 20;
            player.y = 500;
            gameState = "PLAY";
        }

        // --- 6. ボタンのアクション処理 ---
        function executeButtonAction(id) {
            if (id === "TO_SHOP") { gameState = "SHOP"; buildShopUI(); }
            else if (id === "TO_TITLE") { gameState = "TITLE"; buildTitleUI(); }
            else if (id === "TO_ACHIEVE") { gameState = "ACHIEVEMENTS"; buildAchieveUI(); }
            else if (id === "START_GAME") { initPlaySession(); }
            else if (id === "NEXT_STAGE") { startNextStage(); } // 次ステージへ遷移
            else if (id.startsWith("BUY_")) {
                const type = id.replace("BUY_", "");
                const currentLv = playerSave.upgrades[type];
                if (currentLv < 5) {
                    const price = shopConfig[type].prices[currentLv];
                    if (playerSave.coins >= price) {
                        playerSave.coins -= price;
                        playerSave.upgrades[type]++;
                        checkMaxUpgradeAchievement();
                        saveGame();
                        buildShopUI();
                    }
                }
            }
        }

        function buildTitleUI() {
            UI_Buttons = [];
            addBtn("START_GAME", 140, 320, 200, 45, "MISSION START", "#00ff66");
            addBtn("TO_SHOP", 140, 385, 200, 45, "HANGAR & SHOP", "#00f0ff");
            addBtn("TO_ACHIEVE", 140, 450, 200, 45, "ACHIEVEMENTS", "#ffaa00");
        }

        function buildShopUI() {
            UI_Buttons = [];
            let startY = 160;
            ["hp", "speed", "weapon", "shield"].forEach(type => {
                let lv = playerSave.upgrades[type];
                let isMax = lv >= 5;
                let cost = isMax ? "MAX" : shopConfig[type].prices[lv] + " C";
                let btnColor = isMax ? "#666" : (playerSave.coins >= shopConfig[type].prices[lv] ? "#00ff66" : "#ff3333");
                addBtn("BUY_" + type, 320, startY, 120, 35, isMax ? "MAXED" : `UPGRADE (${cost})`, btnColor);
                startY += 65;
            });
            addBtn("TO_TITLE", 140, 520, 200, 45, "BACK TO MENU", "#fff");
        }

        function buildAchieveUI() {
            UI_Buttons = [];
            addBtn("TO_TITLE", 140, 520, 200, 45, "BACK TO MENU", "#fff");
        }

        function checkMaxUpgradeAchievement() {
            let u = playerSave.upgrades;
            if (u.hp === 5 && u.speed === 5 && u.weapon === 5 && u.shield === 5) {
                playerSave.achievements.max_upgrade = true;
            }
        }

        function updateMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            let clientX, clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            mouseX = (clientX - rect.left) * (canvas.width / rect.width);
            mouseY = (clientY - rect.top) * (canvas.height / rect.height);
        }

        canvas.addEventListener("mousemove", (e) => { updateMousePos(e); if(gameState === "PLAY" && player.hp > 0) { player.x = mouseX - player.w/2; player.y = mouseY - player.h/2; } });
        canvas.addEventListener("touchmove", (e) => { updateMousePos(e); if(gameState === "PLAY" && player.hp > 0) { player.x = mouseX - player.w/2; player.y = mouseY - player.h/2; } e.preventDefault(); }, { passive: false });
        canvas.addEventListener("mousedown", (e) => { handleCanvasClick(mouseX, mouseY); });
        canvas.addEventListener("touchstart", (e) => { updateMousePos(e); handleCanvasClick(mouseX, mouseY); e.preventDefault(); }, { passive: false });

        // --- 8. ゲーム本編のメインコアロジック ---
        function shootPlayerWeapon() {
            if (shootCooldown > 0) { shootCooldown--; return; }
            let wLv = player.weapon;
            let cd = wLv >= 4 ? 6 : 8;

            if (wLv === 1) {
                bullets.push({ x: player.x + player.w/2 - 2, y: player.y, vx: 0, vy: -12, dmg: 1 });
            } else if (wLv === 2) {
                bullets.push({ x: player.x + 8, y: player.y, vx: 0, vy: -12, dmg: 1 });
                bullets.push({ x: player.x + player.w - 12, y: player.y, vx: 0, vy: -12, dmg: 1 });
            } else if (wLv === 3) { 
                bullets.push({ x: player.x + player.w/2 - 2, y: player.y, vx: 0, vy: -12, dmg: 1 });
                bullets.push({ x: player.x + 4, y: player.y, vx: -2.5, vy: -11.5, dmg: 1 });
                bullets.push({ x: player.x + player.w - 8, y: player.y, vx: 2.5, vy: -11.5, dmg: 1 });
            } else if (wLv === 4) { 
                bullets.push({ x: player.x + player.w/2 - 3, y: player.y, vx: 0, vy: -14, dmg: 1.5 });
                bullets.push({ x: player.x, y: player.y, vx: -3, vy: -13, dmg: 1 });
                bullets.push({ x: player.x + player.w, y: player.y, vx: 3, vy: -13, dmg: 1 });
            } else { 
                bullets.push({ x: player.x + player.w/2 - 3, y: player.y, vx: 0, vy: -15, dmg: 2 });
                bullets.push({ x: player.x + 6, y: player.y, vx: -2.5, vy: -14, dmg: 1 });
                bullets.push({ x: player.x + player.w - 10, y: player.y, vx: 2.5, vy: -14, dmg: 1 });
                bullets.push({ x: player.x - 4, y: player.y + 10, vx: -5, vy: -12, dmg: 1 });
                bullets.push({ x: player.x + player.w + 4, y: player.y + 10, vx: 5, vy: -12, dmg: 1 });
            }
            shootCooldown = cd;
        }

        function spawnEnemyCluster() {
            if (isBossBattle || warningTimer > 0) return;
            stageProgress++;

            if (stageProgress >= 100) {
                warningTimer = 150;
                return;
            }

            if (frame % (Math.max(15, 35 - currentStage * 5)) === 0) {
                let typeRand = Math.random();
                let ex = Math.random() * (canvas.width - 50) + 10;

                if (currentStage === 1) {
                    if (typeRand < 0.7) {
                        enemies.push({ x: ex, y: -40, w: 30, h: 30, hp: 1, maxHp: 1, type: "meteor", s: 2, score: 50 });
                    } else {
                        enemies.push({ x: ex, y: -40, w: 35, h: 35, hp: 2, maxHp: 2, type: "drone1", s: 2.5, score: 100 });
                    }
                } else if (currentStage === 2) {
                    if (typeRand < 0.4) {
                        enemies.push({ x: ex, y: -40, w: 30, h: 30, hp: 2, maxHp: 2, type: "meteor", s: 3, score: 50 });
                    } else if (typeRand < 0.8) {
                        enemies.push({ x: ex, y: -40, w: 35, h: 35, hp: 2, maxHp: 2, type: "drone1", s: 3, score: 100 });
                    } else {
                        enemies.push({ x: ex, y: -40, w: 40, h: 35, hp: 4, maxHp: 4, type: "scout", s: 1.5, score: 200, dx: Math.random() < 0.5 ? 1 : -1 });
                    }
                } else { 
                    if (typeRand < 0.3) {
                        enemies.push({ x: ex, y: -40, w: 35, h: 35, hp: 3, maxHp: 3, type: "drone1", s: 3.5, score: 100 });
                    } else if (typeRand < 0.7) {
                        enemies.push({ x: ex, y: -40, w: 40, h: 35, hp: 5, maxHp: 5, type: "scout", s: 2, dx: Math.random() < 0.5 ? 1.5 : -1.5, score: 200 });
                    } else {
                        enemies.push({ x: ex, y: -40, w: 45, h: 45, hp: 8, maxHp: 8, type: "cruiser", s: 1.2, score: 400 });
                    }
                }
            }
        }

        function triggerBossSpawn() {
            isBossBattle = true;
            if (currentStage === 1) {
                enemies.push({ x: 180, y: -100, w: 120, h: 80, hp: 60, maxHp: 60, type: "boss1", s: 1, dir: 1, isBoss: true, score: 2000 });
            } else if (currentStage === 2) {
                enemies.push({ x: 160, y: -100, w: 160, h: 90, hp: 120, maxHp: 120, type: "boss2", s: 0.8, dir: 1, isBoss: true, score: 4000 });
            } else {
                enemies.push({ x: 120, y: -120, w: 240, h: 120, hp: 250, maxHp: 250, type: "boss3", s: 0.5, dir: 1, isBoss: true, score: 10000 });
            }
        }

        function gameUpdate() {
            frame++;

            stars.forEach(s => {
                s.y += s.s * (isBossBattle ? 0.5 : 1);
                if(s.y > canvas.height) { s.y = 0; s.x = Math.random()*canvas.width; }
            });

            if (gameState !== "PLAY") return;

            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.w) player.x = canvas.width - player.w;
            if (player.y < 0) player.y = 0;
            if (player.y > canvas.height - player.h) player.y = canvas.height - player.h;

            shootPlayerWeapon();

            if (warningTimer > 0) {
                warningTimer--;
                if (warningTimer === 0) triggerBossSpawn();
            }

            spawnEnemyCluster();

            bullets.forEach(b => { b.x += b.vx; b.y += b.vy; });
            bullets = bullets.filter(b => b.y > -20 && b.x > -20 && b.x < canvas.width + 20);

            enemyBullets.forEach(eb => { eb.x += eb.vx; eb.y += eb.vy; });
            enemyBullets = enemyBullets.filter(eb => eb.y < canvas.height + 20 && eb.x > -20 && eb.x < canvas.width + 20);

            enemies.forEach(e => {
                if (e.isBoss) {
                    e.y += e.s; if (e.y > 70) e.y = 70; 
                    e.x += e.dir * (e.type === "boss2" ? 2 : 1);
                    if (e.x < 10 || e.x > canvas.width - e.w - 10) e.dir *= -1;

                    if (frame % 45 === 0) {
                        if (e.type === "boss1") {
                            for(let i=-1; i<=1; i++) enemyBullets.push({ x: e.x + e.w/2, y: e.y + e.h, vx: i*1.5, vy: 5 });
                        } else if (e.type === "boss2") {
                            for(let i=-2; i<=2; i++) enemyBullets.push({ x: e.x + e.w/2, y: e.y + e.h, vx: i*2, vy: 4.5 });
                        }
                    }
                    if (e.type === "boss3" && frame % 60 === 0) {
                        for(let a=0; a<8; a++) {
                            let angle = (frame*0.05) + (a * Math.PI / 4);
                            enemyBullets.push({ x: e.x + e.w/2, y: e.y + e.h - 20, vx: Math.cos(angle)*4, vy: Math.sin(angle)*4 });
                        }
                    }
                } else {
                    e.y += e.s;
                    if (e.type === "scout") {
                        e.x += e.dx; if(e.x < 10 || e.x > canvas.width - e.w - 10) e.dx *= -1;
                        if(frame % 70 === 0) enemyBullets.push({ x: e.x + e.w/2, y: e.y + e.h, vx: 0, vy: 5 });
                    }
                    if (e.type === "drone1" && frame % 80 === 0) {
                        let angle = Math.atan2(player.y - e.y, player.x - e.x);
                        enemyBullets.push({ x: e.x + e.w/2, y: e.y + e.h, vx: Math.cos(angle)*4.5, vy: Math.sin(angle)*4.5 });
                    }
                    if (e.type === "cruiser" && frame % 50 === 0) {
                        enemyBullets.push({ x: e.x + 10, y: e.y + e.h, vx: -0.5, vy: 4 });
                        enemyBullets.push({ x: e.x + e.w - 10, y: e.y + e.h, vx: 0.5, vy: 4 });
                    }
                }
            });

            items.forEach(it => it.y += 2.5);
            items = items.filter(it => it.y < canvas.height);

            particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life--; });
            particles = particles.filter(p => p.life > 0);

            // --- 衝突判定 ---
            for(let bIdx = bullets.length-1; bIdx >= 0; bIdx--) {
                let b = bullets[bIdx];
                for(let eIdx = enemies.length-1; eIdx >= 0; eIdx--) {
                    let e = enemies[eIdx];
                    if(b.x > e.x && b.x < e.x+e.w && b.y > e.y && b.y < e.y+e.h) {
                        bullets.splice(bIdx, 1);
                        e.hp -= b.dmg;
                        spawnExplosion(b.x, b.y, "#00f0ff", 3);
                        
                        if(e.hp <= 0) {
                            score += e.score;
                            playerSave.stats.total_kills++;
                            spawnExplosion(e.x + e.w/2, e.y + e.h/2, e.isBoss ? "#ff0055" : "#ffaa00", e.isBoss ? 40 : 12);
                            
                            if (e.isBoss) {
                                triggerShake(30, 12);
                                let drops = e.type === "boss1" ? 10 : (e.type === "boss2" ? 20 : 40);
                                for(let k=0; k<drops; k++) items.push({ x: e.x + Math.random()*e.w, y: e.y + Math.random()*e.h, type: "coin" });
                                
                                playerSave.achievements.first_boss = true;
                                if(currentStage === 1 && isNoDamageRun) playerSave.achievements.no_damage_s1 = true;
                                
                                enemies.splice(eIdx, 1);
                                isBossBattle = false;
                                
                                if(currentStage < 3) {
                                    currentStage++;
                                    gameState = "STAGE_CLEAR";
                                    UI_Buttons = [];
                                    addBtn("NEXT_STAGE", 140, 420, 200, 45, "NEXT STAGE ▶", "#00ff66"); // IDとカラーを修正
                                    saveGame();
                                } else {
                                    playerSave.achievements.stage3_clear = true;
                                    gameState = "ENDING";
                                    UI_Buttons = [];
                                    addBtn("TO_TITLE", 140, 480, 200, 45, "RETURN TO MENU", "#00f0ff");
                                    saveGame();
                                }
                            } else {
                                if(Math.random() < 0.22) items.push({ x: e.x + e.w/2, y: e.y, type: "coin" });
                                enemies.splice(eIdx, 1);
                            }
                        }
                        break;
                    }
                }
            }

            for(let iIdx = items.length-1; iIdx >= 0; iIdx--) {
                let it = items[iIdx];
                if(it.x > player.x - 10 && it.x < player.x + player.w + 10 && it.y > player.y - 10 && it.y < player.y + player.h + 10) {
                    items.splice(iIdx, 1);
                    playerSave.coins += 10;
                    playerSave.stats.total_coins += 10;
                    if(playerSave.coins >= 1000) playerSave.achievements.coin_hunter = true;
                    saveGame();
                }
            }

            function handlePlayerHit() {
                if (player.shield > 0) {
                    player.shield--;
                    triggerShake(10, 5);
                    spawnExplosion(player.x + player.w/2, player.y + player.h/2, "#00f0ff", 8);
                } else {
                    player.hp--;
                    isNoDamageRun = false;
                    triggerShake(20, 9);
                    spawnExplosion(player.x + player.w/2, player.y + player.h/2, "#ff0000", 20);
                    if (player.hp <= 0) {
                        gameState = "GAMEOVER";
                        if(score > playerSave.highScore) playerSave.highScore = score;
                        saveGame();
                        UI_Buttons = [];
                        addBtn("TO_TITLE", 140, 440, 200, 45, "BACK TO HANGAR", "#ff3333");
                    }
                }
            }

            for(let ebIdx = enemyBullets.length-1; ebIdx >= 0; ebIdx--) {
                let eb = enemyBullets[ebIdx];
                if(eb.x > player.x + 4 && eb.x < player.x + player.w - 4 && eb.y > player.y + 4 && eb.y < player.y + player.h - 4) {
                    enemyBullets.splice(ebIdx, 1);
                    handlePlayerHit();
                    break;
                }
            }

            enemies.forEach(e => {
                if(e.x < player.x + player.w - 6 && e.x + e.w > player.x + 6 && e.y < player.y + player.h - 6 && e.y + e.h > player.y + 6) {
                    e.hp = 0; 
                    spawnExplosion(e.x + e.w/2, e.y + e.h/2, "#ffaa00", 10);
                    handlePlayerHit();
                }
            });

            enemies = enemies.filter(e => e.y < canvas.height + 40);
        }

        // --- 9. レンダリング処理 ---
        function gameDraw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 描画基準をリセット
            ctx.textBaseline = "top";
            ctx.textAlign = "left";

            ctx.save();
            if (shakeTimer > 0) {
                let dx = (Math.random() - 0.5) * shakeIntensity;
                let dy = (Math.random() - 0.5) * shakeIntensity;
                ctx.translate(dx, dy);
                shakeTimer--;
            }

            ctx.fillStyle = "#fff";
            stars.forEach(s => ctx.fillRect(s.x, s.y, s.s, s.s));

            if (gameState === "TITLE") {
                ctx.textAlign = "center";
                ctx.fillStyle = "#00f0ff";
                ctx.font = "bold 32px sans-serif";
                ctx.fillText("GALAXY SHOOTER", canvas.width/2, 140);
                ctx.fillStyle = "#ffaa00";
                ctx.font = "italic bold 20px sans-serif";
                ctx.fillText("- EXTREME EDITION -", canvas.width/2, 180);
                
                ctx.fillStyle = "#888";
                ctx.font = "14px sans-serif";
                ctx.fillText(`HI-SCORE: ${playerSave.highScore} PTS`, canvas.width/2, 230);
                ctx.fillText(`TOTAL COINS: ${playerSave.coins} C`, canvas.width/2, 255);
                drawButtons();
            } 
            else if (gameState === "SHOP") {
                ctx.fillStyle = "#00f0ff"; ctx.font = "bold 24px sans-serif"; ctx.fillText("HANGAR UPGRADE SHOP", 30, 60);
                ctx.fillStyle = "#ffd700"; ctx.font = "bold 16px sans-serif"; ctx.fillText(`CURRENT COINS: ${playerSave.coins} COINS`, 30, 95);
                
                let startY = 145;
                ["hp", "speed", "weapon", "shield"].forEach(type => {
                    ctx.fillStyle = "#aaa"; ctx.font = "bold 13px sans-serif"; ctx.fillText(shopConfig[type].name, 30, startY);
                    let lv = playerSave.upgrades[type];
                    for(let i=0; i<5; i++) {
                        ctx.fillStyle = i < lv ? "#00ff66" : "#222";
                        ctx.fillRect(30 + i*22, startY+18, 16, 12);
                        ctx.strokeStyle = "#555"; ctx.strokeRect(30 + i*22, startY+18, 16, 12);
                    }
                    startY += 65;
                });
                drawButtons();
            }
            else if (gameState === "ACHIEVEMENTS") {
                ctx.fillStyle = "#ffaa00"; ctx.font = "bold 24px sans-serif"; ctx.fillText("ACHIEVEMENTS", 30, 60);
                const acList = [
                    { k: "first_boss", n: "■ 初戦突破", d: "任意のボスを1体以上撃破する" },
                    { k: "max_upgrade", n: "■ 究極機体", d: "ショップの全項目を最大まで強化する" },
                    { k: "coin_hunter", n: "■ 大富豪", d: "手持ちの所持金を1,000コイン以上にする" },
                    { k: "no_damage_s1", n: "■ 完璧な操縦", d: "Stage 1のボスを被弾なしでクリア" },
                    { k: "stage3_clear", n: "■ 銀河の救世主", d: "ゲームのStage 3(最終章)を完全攻略する" }
                ];
                let sy = 120;
                acList.forEach(a => {
                    let cleared = playerSave.achievements[a.k];
                    ctx.fillStyle = cleared ? "#ffaa00" : "#444"; ctx.font = "bold 15px sans-serif"; ctx.fillText(a.n + (cleared ? " [COMPLETE]" : ""), 30, sy);
                    ctx.fillStyle = cleared ? "#fff" : "#666"; ctx.font = "12px sans-serif"; ctx.fillText(a.d, 35, sy+22);
                    sy += 65;
                });
                drawButtons();
            }
            else if (gameState === "PLAY" || gameState === "STAGE_CLEAR" || gameState === "GAMEOVER") {
                ctx.fillStyle = "#00ffff";
                bullets.forEach(b => ctx.fillRect(b.x, b.y, 5, 12));

                ctx.fillStyle = "#ff3366";
                enemyBullets.forEach(eb => {
                    ctx.beginPath(); ctx.arc(eb.x, eb.y, 4, 0, Math.PI*2); ctx.fill();
                });

                ctx.font = "16px sans-serif";
                items.forEach(it => ctx.fillText("🪙", it.x, it.y));

                particles.forEach(p => {
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, p.size, p.size);
                });

                enemies.forEach(e => {
                    if (e.isBoss) {
                        ctx.font = e.type === "boss3" ? "90px sans-serif" : "65px sans-serif";
                        ctx.fillText("🛸", e.x, e.y);
                        
                        ctx.fillStyle = "rgba(255,255,255,0.15)"; ctx.fillRect(e.x, e.y - 15, e.w, 6);
                        ctx.fillStyle = "#ff0055"; ctx.fillRect(e.x, e.y - 15, (e.hp / e.maxHp)*e.w, 6);
                    } else {
                        ctx.font = e.type === "meteor" ? "24px sans-serif" : "28px sans-serif";
                        let emoji = e.type === "meteor" ? "☄️" : (e.type === "cruiser" ? "🛩️" : "👾");
                        ctx.fillText(emoji, e.x, e.y);
                    }
                });

                // 自機（🚀）の直接描画バグ修正
                if (player.hp > 0) {
                    ctx.font = "36px sans-serif";
                    ctx.fillText("🚀", player.x, player.y);
                    if (player.shield > 0) {
                        ctx.strokeStyle = "rgba(0, 240, 255, 0.6)"; ctx.lineWidth = 3;
                        ctx.beginPath(); ctx.arc(player.x + player.w/2, player.y + player.h/2, 28, 0, Math.PI*2); ctx.stroke();
                    }
                }

                if (warningTimer > 0) {
                    if (Math.floor(frame / 12) % 2 === 0) {
                        ctx.fillStyle = "rgba(255, 0, 50, 0.2)"; ctx.fillRect(0, 220, canvas.width, 90);
                        ctx.fillStyle = "#ff0033"; ctx.font = "bold 30px sans-serif"; ctx.textAlign = "center";
                        ctx.fillText("⚠️ EMERGENCY WARNING ⚠️", canvas.width/2, 235);
                        ctx.font = "14px sans-serif"; ctx.fillText("HUGE ALIEN WARSHIP APPROACHING", canvas.width/2, 275);
                    }
                }

                // HUDヘッダー
                ctx.fillStyle = "rgba(0,0,0,0.4)"; ctx.fillRect(0, 0, canvas.width, 40);
                ctx.fillStyle = "#fff"; ctx.font = "bold 13px sans-serif"; ctx.textAlign = "left";
                ctx.fillText(`STAGE: ${currentStage}`, 15, 12);
                ctx.fillText(`SCORE: ${score}`, 100, 12);
                ctx.fillText(`COIN: ${playerSave.coins}`, 220, 12);

                let heartStr = ""; for(let h=0; h<player.maxHp; h++) heartStr += (h < player.hp ? "❤️" : "🖤");
                ctx.fillText(heartStr, 360, 12);

                if (gameState === "STAGE_CLEAR") {
                    ctx.fillStyle = "rgba(0,0,0,0.75)"; ctx.fillRect(0,0,canvas.width,canvas.height);
                    ctx.textAlign = "center"; ctx.fillStyle = "#00ff66"; ctx.font = "bold 32px sans-serif";
                    ctx.fillText(`STAGE ${currentStage - 1} CLEAR 🎖️`, canvas.width/2, 240);
                    ctx.fillStyle = "#fff"; ctx.font = "16px sans-serif";
                    ctx.fillText("ハンガーにデータが同期されました", canvas.width/2, 300);
                    ctx.fillText("機体を強化して次の作戦へ進みましょう", canvas.width/2, 325);
                    drawButtons(); 
                }

                if (gameState === "GAMEOVER") {
                    ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(0,0,canvas.width,canvas.height);
                    ctx.textAlign = "center"; ctx.fillStyle = "#ff3333"; ctx.font = "bold 36px sans-serif";
                    ctx.fillText("MISSION FAILED", canvas.width/2, 240);
                    ctx.fillStyle = "#aaa"; ctx.font = "16px sans-serif";
                    ctx.fillText(`獲得スコア: ${score} PTS`, canvas.width/2, 300);
                    ctx.fillText("集めたコインはハンガーに持ち帰れます！", canvas.width/2, 330);
                    drawButtons(); 
                }
            }
            else if (gameState === "ENDING") {
                ctx.fillStyle = "rgba(0,0,0,0.9)"; ctx.fillRect(0,0,canvas.width,canvas.height);
                ctx.textAlign = "center"; ctx.fillStyle = "#ffd700"; ctx.font = "bold 34px sans-serif";
                ctx.fillText("🏆 ALL STAGES CLEAR 🏆", canvas.width/2, 180);
                ctx.fillStyle = "#fff"; ctx.font = "16px sans-serif";
                ctx.fillText("全銀河要塞の無力化に成功！", canvas.width/2, 260);
                ctx.fillText("あなたは伝説のエースパイロットです。", canvas.width/2, 290);
                ctx.fillStyle = "#00f0ff"; ctx.font = "bold 20px sans-serif";
                ctx.fillText(`FINAL SCORE: ${score} PTS`, canvas.width/2, 360);
                drawButtons(); 
            }

            ctx.restore(); 
        }

        function loop() {
            gameUpdate();
            gameDraw();
            requestAnimationFrame(loop);
        }

        loadGame();
        buildTitleUI();
        loop();
    </script>
</body>
</html>
